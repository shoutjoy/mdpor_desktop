<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
﻿<div class="flex items-center justify-between gap-2">
    <label class="flex items-center gap-2 cursor-pointer select-none">
        <input type="checkbox" id="todocs-visible" onclick="setTimeout(toggleToDocsSection,0)"
            class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
        <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Share 보이기</span>
    </label>
    <button type="button" id="share-settings-fold-btn" onclick="toggleShareSettingsFold()"
        class="px-2 py-1 rounded border border-slate-300 dark:border-slate-600 text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700"
        title="Share 설정 접기/펼치기">접기</button>
</div>
<div id="share-destinations-settings" class="pl-6 pt-1 space-y-2">
    <p class="text-xs font-semibold text-slate-600 dark:text-slate-400">Share Destinations</p>
    <div id="share-destinations-settings-body" class="space-y-2">
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-docs" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">docs.new</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-gemini" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">gemini.new</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-colab" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">colab.new</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-story" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">story.new</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-sheets" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">sheets.new</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-slides" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">slides.new</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-gist" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">gist.new</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-board" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">board.new</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-pdf2ppt" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">pdf to pptx</span>
        </label>
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="share-site-naverblog" onclick="setTimeout(toggleShareSiteSelection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">NaverBlog</span>
        </label>
        <div class="pl-6 space-y-2">
            <div class="flex items-center gap-2">
                <input type="text" id="share-naverblog-id" placeholder="네이버 블로그 ID"
                    class="flex-1 min-w-[140px] px-2.5 py-1.5 border rounded-md text-xs bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
                <button type="button" onclick="saveNaverBlogIdFromSettings()"
                    class="px-2.5 py-1.5 rounded-md text-xs font-semibold text-white bg-emerald-600 hover:bg-emerald-700">저장</button>
            </div>
            <p class="text-[11px] text-slate-500 dark:text-slate-400">Share에서 NaverBlog를 누를 때 사용할 ID입니다. 비어 있으면 실행 시 입력받습니다.</p>
        </div>
        <div class="pt-2 border-t border-slate-200 dark:border-slate-700 space-y-2">
            <p class="text-xs font-semibold text-slate-600 dark:text-slate-400">+Add</p>
            <div class="flex items-center gap-2">
                <input type="text" id="share-custom-name" placeholder="이름 (예: research)"
                    class="flex-1 min-w-[100px] px-2.5 py-1.5 border rounded-md text-xs bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
                <input type="text" id="share-custom-url" placeholder="주소 (예: https://example.com)"
                    class="flex-[1.4] min-w-[140px] px-2.5 py-1.5 border rounded-md text-xs bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
                <button type="button" onclick="addShareDestinationFromSettings()"
                    class="px-2.5 py-1.5 rounded-md text-xs font-semibold text-white bg-indigo-600 hover:bg-indigo-700">+Add</button>
            </div>
            <div id="share-custom-destinations-list" class="space-y-1"></div>
        </div>
    </div>
</div>

</body>
</html>
