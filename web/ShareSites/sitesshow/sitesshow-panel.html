<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
<div id="sites-panel" class="fixed bottom-3 right-3 hidden flex-col z-50 no-print w-[min(520px,94vw)] rounded-lg border border-slate-300 dark:border-slate-700 bg-white/95 dark:bg-slate-900/95 shadow-2xl backdrop-blur-sm overflow-hidden">
    <div id="sites-panel-header" class="flex items-center justify-between px-3 py-2 border-b border-slate-200 dark:border-slate-700 cursor-move select-none">
        <h3 class="text-sm font-bold text-slate-800 dark:text-slate-100">Sites</h3>
        <div class="flex items-center gap-1.5">
            <button type="button" onclick="toggleSitesSettingsPanel()"
                class="px-2 py-1 rounded border border-slate-300 dark:border-slate-600 text-xs text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700"
                title="Settings">⚙</button>
            <button type="button" id="sites-panel-compact-btn" onclick="toggleSitesCompactMode()"
                class="px-2 py-1 rounded border border-slate-300 dark:border-slate-600 text-xs text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">>></button>
            <button type="button" onclick="closeSitesPanel()"
                class="px-2 py-1 rounded border border-slate-300 dark:border-slate-600 text-xs text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">Close</button>
        </div>
    </div>
    <div id="sites-panel-body" class="p-3 space-y-2 flex flex-col flex-1 min-h-0">
        <div id="sites-add-row" class="flex items-center gap-2 flex-wrap">
            <input type="text" id="sites-add-name-input" placeholder="보이기"
                class="w-[120px] px-2.5 py-1.5 rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 text-xs">
            <input type="url" id="sites-add-url-input" placeholder="주소 (https://example.com)"
                class="flex-1 min-w-[180px] px-2.5 py-1.5 rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 text-xs">
            <button type="button" id="sites-add-submit-btn" onclick="addSiteFromInput()"
                class="px-2.5 py-1.5 rounded bg-indigo-600 text-white text-xs font-semibold hover:bg-indigo-700">+URL</button>
            <button type="button" id="sites-edit-cancel-btn" onclick="cancelEditSite()"
                class="hidden px-2.5 py-1.5 rounded border border-slate-300 dark:border-slate-600 text-xs text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700">Cancel</button>
        </div>
        <div id="sites-list" class="space-y-1.5 flex-1 min-h-0 overflow-auto pr-1"></div>
        <div id="sites-settings-wrap" class="hidden border-t border-slate-200 dark:border-slate-700 pt-2">
            <div class="text-[11px] font-semibold text-slate-600 dark:text-slate-300 mb-1">Manage sites in settings</div>
            <div id="sites-list-settings" class="space-y-1.5 max-h-40 overflow-auto pr-1"></div>
        </div>
    </div>
    <div id="sites-panel-resizer" title="Resize"
        class="absolute right-0 bottom-0 w-4 h-4 cursor-nwse-resize opacity-70 hover:opacity-100 select-none"
        style="background:linear-gradient(135deg,transparent 45%,#94a3b8 46%,#94a3b8 54%,transparent 55%);"></div>
</div>

</body>
</html>
