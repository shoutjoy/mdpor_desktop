<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
<!-- Merge Modal (document merge) -->
<div id="merge-modal" data-source="merge-doc" class="fixed inset-0 hidden z-[55] no-print pointer-events-none bg-transparent">
  <div id="merge-panel" class="pointer-events-auto fixed bg-white dark:bg-slate-800 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 p-4 w-[min(420px,92vw)] h-[min(560px,78vh)] min-w-[300px] min-h-[320px] flex flex-col overflow-hidden">
    <div id="merge-panel-header" class="flex items-center justify-between mb-3 gap-2 cursor-move touch-none select-none shrink-0">
      <h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
        <i data-lucide="layers" class="w-5 h-5"></i> 문서 묶기
      </h3>
      <button type="button" onclick="closeMergeModal()"
        class="px-2 py-1 rounded border border-slate-300 dark:border-slate-600 text-xs text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">Close</button>
    </div>
    <div class="flex gap-2 mb-3 shrink-0">
      <input type="text" id="merge-bundle-name" placeholder="새로운 묶음 파일"
        class="flex-1 min-w-0 px-3 py-2 border border-slate-200 dark:border-slate-600 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100">
      <button type="button" onclick="bindMerge()"
        class="px-4 py-2 bg-slate-800 dark:bg-slate-200 text-white dark:text-slate-800 rounded-md text-sm font-bold border border-slate-700 dark:border-slate-300 hover:bg-slate-700 dark:hover:bg-slate-300">Bind</button>
    </div>
    <div class="mb-3 shrink-0 space-y-2">
      <input type="text" id="merge-search-input" placeholder="문서 검색..." oninput="filterMergeList(this.value)"
        class="w-full px-3 py-2 border border-slate-200 dark:border-slate-600 rounded-md focus:ring-2 focus:ring-indigo-500 focus:outline-none text-sm bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100">
      <div class="grid grid-cols-3 gap-2">
        <button type="button" onclick="selectAllMergeItems()"
          class="px-3 py-1.5 text-xs font-medium border border-slate-200 dark:border-slate-600 rounded-md text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700">전체선택</button>
        <button type="button" onclick="deselectAllMergeItems()"
          class="px-3 py-1.5 text-xs font-medium border border-slate-200 dark:border-slate-600 rounded-md text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700">전체 해제</button>
        <button type="button" id="merge-selected-only-btn" onclick="toggleSelectedOnlyMergeView()"
          class="px-3 py-1.5 text-xs font-medium border border-slate-900 dark:border-slate-100 rounded-md text-slate-900 dark:text-slate-100 hover:bg-slate-100 dark:hover:bg-slate-700">선택 보기</button>
      </div>
    </div>
    <div id="merge-list" class="flex-1 overflow-y-auto space-y-2 min-h-0 custom-scrollbar"></div>
    <div class="mt-4 pt-4 border-t border-slate-200 dark:border-slate-600 shrink-0">
      <button type="button" onclick="closeMergeModal()"
        class="w-full px-4 py-2 border border-slate-200 dark:border-slate-600 rounded-md text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700">취소</button>
    </div>
    <div id="merge-panel-resizer" title="Resize"
      class="absolute right-0 bottom-0 w-5 h-5 cursor-nwse-resize touch-none opacity-70 hover:opacity-100 select-none"
      style="background:linear-gradient(135deg,transparent 45%,#94a3b8 46%,#94a3b8 54%,transparent 55%);"></div>
  </div>
</div>

</body>
</html>
