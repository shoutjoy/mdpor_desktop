<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
<div class="pt-3 border-t border-slate-200 dark:border-slate-700 space-y-2" id="github-settings-wrap">
    <div class="flex items-center justify-between gap-2">
        <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="ai-github-enabled" onclick="setTimeout(toggleGithubSettingsSection,0)"
                class="rounded border-slate-300 dark:border-slate-600 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">github 사용설정</span>
        </label>
        <button type="button" id="github-settings-fold-btn" onclick="toggleGithubSettingsFold()"
            class="px-2 py-1 rounded border border-slate-300 dark:border-slate-600 text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700">
            접기
        </button>
    </div>
    <div id="github-settings-body" class="hidden pl-6 space-y-2">
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400">Personal Access Token (PAT)</label>
        <input type="password" id="github-token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
            autocomplete="off"
            class="w-full px-3 py-1.5 border rounded-md text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
        <a href="https://github.com/settings/tokens/new" target="_blank" rel="noopener noreferrer"
            class="text-xs text-indigo-600 dark:text-indigo-400 hover:underline">토큰 발급: https://github.com/settings/tokens/new</a>
        <div class="flex items-center gap-2 flex-wrap">
            <button type="button" onclick="checkGithubConnectionFromModal()"
                class="px-3 py-1.5 bg-cyan-600 rounded-md text-xs font-medium text-white hover:bg-cyan-700">연결 확인</button>
            <div id="github-connection-status"
                class="flex-1 min-w-[160px] flex items-center gap-2 px-2 py-1.5 rounded-md border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-xs text-slate-500 dark:text-slate-400">
                <span id="github-connection-dot" class="inline-block w-2.5 h-2.5 rounded-full bg-slate-400"></span>
                <span id="github-connection-text">GitHub 연결 상태를 확인하지 않았습니다.</span>
            </div>
        </div>
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400">저장소 (owner/repo)</label>
        <input type="text" id="github-repo-input" placeholder="username/my-notes"
            class="w-full px-3 py-1.5 border rounded-md text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
        <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400">기본 push 폴더 (선택)</label>
        <input type="text" id="github-default-push-path-input" placeholder="notes/research"
            class="w-full px-3 py-1.5 border rounded-md text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
        <details class="rounded-md border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40 px-2 py-1">
            <summary class="cursor-pointer text-xs font-semibold text-slate-600 dark:text-slate-300">브랜치 / pull 설정</summary>
            <div class="pt-2 space-y-2">
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400">브랜치</label>
                <input type="text" id="github-branch-input" placeholder="main"
                    class="w-full px-3 py-1.5 border rounded-md text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400">pull 최대 파일 수 (1~10000)</label>
                <input type="number" id="github-pull-max-files-input" min="1" max="10000" step="1" value="10000"
                    class="w-full px-3 py-1.5 border rounded-md text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
            </div>
        </details>
        <details class="rounded-md border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/40 px-2 py-1">
            <summary class="cursor-pointer text-xs font-semibold text-slate-600 dark:text-slate-300">새 저장소 생성</summary>
            <div class="pt-2 space-y-2">
                <label class="block text-xs font-semibold text-slate-500 dark:text-slate-400">새 저장소명(생성용)</label>
                <input type="text" id="github-new-repo-name-input" placeholder="my-notes"
                    class="w-full px-3 py-1.5 border rounded-md text-sm bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 border-slate-200 dark:border-slate-600">
                <button type="button" onclick="openGithubRepoCreateModal()"
                    class="px-3 py-1.5 bg-emerald-600 rounded-md text-xs font-medium text-white hover:bg-emerald-700">저장소 생성</button>
            </div>
        </details>
        <div class="flex items-center gap-2 flex-wrap">
            <button type="button" onclick="saveGithubSettingsFromModal()"
                class="px-3 py-1.5 bg-indigo-600 rounded-md text-xs font-medium text-white hover:bg-indigo-700">github 설정 저장</button>
            <button type="button" onclick="pullGithubRepo()"
                class="px-3 py-1.5 bg-slate-600 rounded-md text-xs font-medium text-white hover:bg-slate-700">pull</button>
        </div>
        <p id="github-settings-feedback" class="text-xs min-h-[1rem] text-slate-500 dark:text-slate-400" aria-live="polite"></p>
    </div>
</div>

<div id="github-create-repo-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[2147483646] no-print" onclick="if(event.target===this) closeGithubRepoCreateModal()">
    <div class="w-full max-w-sm rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-xl p-4 space-y-3">
        <h3 class="text-base font-bold text-slate-800 dark:text-slate-100">새 GitHub 저장소 생성</h3>
        <p class="text-xs text-slate-500 dark:text-slate-400">공개 범위를 선택한 뒤 생성하세요.</p>
        <div class="space-y-2">
            <label class="flex items-center gap-2 text-sm text-slate-700 dark:text-slate-200 cursor-pointer">
                <input type="radio" name="github-repo-visibility" value="public" checked
                    class="text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600">
                <span>Public</span>
            </label>
            <label class="flex items-center gap-2 text-sm text-slate-700 dark:text-slate-200 cursor-pointer">
                <input type="radio" name="github-repo-visibility" value="private"
                    class="text-indigo-600 focus:ring-indigo-500 border-slate-300 dark:border-slate-600">
                <span>Private</span>
            </label>
        </div>
        <div class="flex items-center justify-end gap-2 pt-1">
            <button type="button" onclick="closeGithubRepoCreateModal()"
                class="px-3 py-1.5 rounded-md border border-slate-300 dark:border-slate-600 text-xs font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800">취소</button>
            <button type="button" onclick="confirmGithubRepoCreateModal()"
                class="px-3 py-1.5 rounded-md bg-emerald-600 text-xs font-medium text-white hover:bg-emerald-700">생성</button>
        </div>
    </div>
</div>

</body>
</html>
